<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Client Login – Lumisys Limited</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sometype+Mono:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

  <div class="auth-card">
    <h2>Client Login</h2>
    <p class="subtitle">Sign in to access your client area.</p>

    <div class="error-msg" id="error-msg">
      Invalid username or password. Please try again.
    </div>

    <form id="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" autocomplete="username" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primary">Sign In</button>
    </form>

    <span class="auth-back">
      <a href="index.html">&larr; Back to homepage</a>
    </span>
  </div>

  <script src="auth.js"></script>
  <script>
    document.getElementById('login-form').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const success = login(username, password);
      if (!success) {
        const errorEl = document.getElementById('error-msg');
        errorEl.classList.add('visible');
      }
    });
  </script>

</body>
</html>
